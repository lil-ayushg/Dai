<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Densé AI | Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        .bot-message {
            background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%);
            border-bottom-left-radius: 2px;
        }

        .user-message {
            background: rgba(255, 255, 255, 0.05);
            border-bottom-right-radius: 2px;
        }

        /* Loading Dots Animation */
        .dot { animation: dot-blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-6">

    <div class="w-full max-w-2xl h-[90vh] flex flex-col glass rounded-3xl shadow-2xl overflow-hidden relative">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-white/10 flex items-center justify-between bg-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-violet-600 to-fuchsia-500 flex items-center justify-center shadow-lg">
                    <span class="text-xl">D</span>
                </div>
                <div>
                    <h1 class="font-semibold text-lg neon-text">Densé AI</h1>
                    <p class="text-xs text-emerald-400 flex items-center gap-1">
                        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> Online
                    </p>
                </div>
            </div>
            <button id="clearChat" class="text-white/40 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
        </div>

        <!-- Chat Container -->
        <div id="chatContainer" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
            <!-- Initial Message -->
            <div class="flex flex-col gap-2 max-w-[85%] bot-message p-4 rounded-2xl message-in">
                <p class="text-sm leading-relaxed">Yo! I'm Densé AI. What's on your mind? 🤙</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-white/5 border-t border-white/10">
            <form id="chatForm" class="flex items-center gap-3">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Type a message..." 
                    class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-violet-500/50 transition-all placeholder:text-white/20"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="sendBtn"
                    class="bg-violet-600 hover:bg-violet-500 p-3 rounded-2xl shadow-lg shadow-violet-900/20 transition-all active:scale-95 disabled:opacity-50"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
            <p class="text-[10px] text-center mt-3 text-white/20">Densé AI can make mistakes. Made by Ayush Garai.</p>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearChat');

        const API_URL = 'https://avacgmjbnivjgzdmjtjz.supabase.co/functions/v1/rapid-handler';
        const AUTH_KEY = 'sb_publishable_eneAtKxMDKsjQTWYjn-ocw_PB12T_Ox';

        let chatHistory = [];

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[85%] p-4 rounded-2xl message-in ${role === 'user' ? 'user-message' : 'bot-message shadow-lg'}`;
            
            const content = document.createElement('p');
            content.className = "text-sm leading-relaxed";
            content.textContent = text;
            
            msgDiv.appendChild(content);
            wrapper.appendChild(msgDiv);
            chatContainer.appendChild(wrapper);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showLoading() {
            const wrapper = document.createElement('div');
            wrapper.id = 'loadingIndicator';
            wrapper.className = 'flex justify-start';
            wrapper.innerHTML = `
                <div class="bot-message p-4 rounded-2xl flex gap-1">
                    <span class="dot w-1.5 h-1.5 bg-white/50 rounded-full"></span>
                    <span class="dot w-1.5 h-1.5 bg-white/50 rounded-full"></span>
                    <span class="dot w-1.5 h-1.5 bg-white/50 rounded-full"></span>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage(e) {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // Update UI
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            appendMessage('user', message);
            showLoading();

            // Prepare Gemini format
            chatHistory.push({ role: "user", parts: [{ text: message }] });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${AUTH_KEY}`,
                        'apikey': AUTH_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ contents: chatHistory })
                });

                const data = await response.json();
                
                // Remove loader
                document.getElementById('loadingIndicator')?.remove();

                const botReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Something went sideways. Try again.";
                
                appendMessage('model', botReply);
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });

            } catch (error) {
                document.getElementById('loadingIndicator')?.remove();
                appendMessage('model', "Error connecting to the mothership. Check your connection.");
                console.error(error);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        chatForm.addEventListener('submit', sendMessage);
        
        clearBtn.addEventListener('click', () => {
            chatContainer.innerHTML = '';
            chatHistory = [];
            appendMessage('model', "Chat cleared. What's next? ✌️");
        });
    </script>
</body>
</html>
